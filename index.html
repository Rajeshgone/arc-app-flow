```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arc App Pro</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  padding: 20px;
}

.container {
  max-width: 420px;
  margin: auto;
}

.header {
  text-align: center;
  margin-bottom: 20px;
}

.header h1 {
  font-size: 26px;
  background: linear-gradient(90deg, #38bdf8, #6366f1);
  -webkit-background-clip: text;
  color: transparent;
}

.card {
  background: rgba(30, 41, 59, 0.6);
  backdrop-filter: blur(15px);
  border-radius: 18px;
  padding: 18px;
  margin-bottom: 15px;
  border: 1px solid rgba(255,255,255,0.05);
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.primary {
  background: linear-gradient(90deg, #6366f1, #3b82f6);
  color: white;
}

.primary:hover {
  opacity: 0.9;
}

input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 10px;
  border: none;
  background: #0f172a;
  color: white;
}

.balance {
  font-size: 22px;
  font-weight: 600;
  margin-top: 5px;
}

.address {
  font-size: 12px;
  opacity: 0.7;
  word-break: break-all;
}

.tx-item {
  background: rgba(15, 23, 42, 0.8);
  padding: 8px;
  border-radius: 10px;
  font-size: 12px;
  margin-top: 6px;
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #1e293b;
  padding: 10px 20px;
  border-radius: 10px;
  display: none;
}

.loader {
  display: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>Arc App</h1>
</div>

<div class="card">
  <button class="primary" onclick="connectWallet()">Connect Wallet</button>
  <p class="address" id="address">Not connected</p>
  <p class="balance" id="balance">0</p>
</div>

<div class="card">
  <h3>Send</h3>
  <input id="to" placeholder="Receiver address">
  <input id="amount" placeholder="Amount">
  <button class="primary" onclick="sendTx()">Send Transaction</button>
  <div class="loader" id="loader">Processing...</div>
</div>

<div class="card">
  <h3>Transactions</h3>
  <div id="history"></div>
</div>

</div>

<div class="toast" id="toast"></div>

<script>
let provider;
let signer;

const ARC_CHAIN = {
  chainId: "0x3039",
  chainName: "Arc Testnet",
  rpcUrls: ["https://rpc.arc.xyz"],
  nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 6 },
  blockExplorerUrls: ["https://explorer.arc.xyz"]
};

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.style.display = "block";
  setTimeout(() => toast.style.display = "none", 3000);
}

async function connectWallet() {
  if (!window.ethereum) return showToast("Install wallet");

  provider = new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = await provider.getSigner();

  const address = await signer.getAddress();
  document.getElementById("address").innerText = address;

  await switchNetwork();
  getBalance();

  showToast("Wallet connected");
}

async function switchNetwork() {
  try {
    await window.ethereum.request({
      method: "wallet_switchEthereumChain",
      params: [{ chainId: ARC_CHAIN.chainId }]
    });
  } catch {
    await window.ethereum.request({
      method: "wallet_addEthereumChain",
      params: [ARC_CHAIN]
    });
  }
}

async function getBalance() {
  const address = await signer.getAddress();
  const bal = await provider.getBalance(address);
  document.getElementById("balance").innerText =
    ethers.formatEther(bal) + " USDC";
}

async function sendTx() {
  const to = document.getElementById("to").value;
  const amount = document.getElementById("amount").value;

  document.getElementById("loader").style.display = "block";

  try {
    const tx = await signer.sendTransaction({
      to,
      value: ethers.parseEther(amount)
    });

    saveTx(tx.hash);
    renderHistory();

    showToast("Transaction sent");
  } catch (e) {
    showToast("Error sending tx");
  }

  document.getElementById("loader").style.display = "none";
}

function saveTx(hash) {
  const txs = JSON.parse(localStorage.getItem("arcTxs") || "[]");
  txs.unshift(hash);
  localStorage.setItem("arcTxs", JSON.stringify(txs));
}

function renderHistory() {
  const txs = JSON.parse(localStorage.getItem("arcTxs") || "[]");
  const el = document.getElementById("history");
  el.innerHTML = "";

  txs.forEach(tx => {
    const div = document.createElement("div");
    div.className = "tx-item";
    div.innerText = tx;
    el.appendChild(div);
  });
}

renderHistory();
</script>

</body>
</html>
```
